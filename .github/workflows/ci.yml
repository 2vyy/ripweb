name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  check-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache target directory and registry
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest

      - name: Install cargo-insta
        uses: taiki-e/install-action@cargo-insta

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Clippy Lints
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Audit Dependencies
        # Only check advisories, as full ban/license setup requires cargo-deny.toml config
        run: cargo deny check advisories

      - name: Run Tests (nextest)
        run: cargo nextest run --all-features

      - name: Run Doc Tests
        run: cargo test --doc

      - name: Check Snapshots
        # Fails if there are uncommitted snapshot changes
        run: cargo insta test --unreferenced=reject
