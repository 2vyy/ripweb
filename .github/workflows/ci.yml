name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  check-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache target directory and registry
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest

      - name: Install cargo-insta
        uses: taiki-e/install-action@cargo-insta

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Clippy Lints
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Audit Dependencies
        # Only check advisories, as full ban/license setup requires cargo-deny.toml config
        run: cargo deny check advisories

      - name: Run Tests (nextest)
        run: cargo nextest run --all-features --retries 3

      - name: Install cargo-machete
        uses: taiki-e/install-action@cargo-machete

      - name: Install and run cargo-machete (unused dependencies)
        run: cargo machete

      - name: Install and run jscpd (duplicate code)
        run: npm install -g jscpd && jscpd ./src

      - name: Large file detection
        run: find src -type f -name "*.rs" -exec wc -l {} \; | awk '$1 > 1000 {print "File too large:", $2; exit 1}'

      - name: Run Doc Tests
        run: cargo test --doc

      - name: Check Snapshots
        # Fails if there are uncommitted snapshot changes
        run: cargo insta test --unreferenced=reject

  coverage:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install apt deps
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config libclang-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache target directory and registry
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@cargo-tarpaulin

      - name: Run Tarpaulin (coverage)
        run: cargo tarpaulin --all-features --out Xml --run-types Tests --fail-under 70 --exclude-files src/main.rs 'src/bin/*' src/search/mod.rs src/research/track.rs src/extract/jina.rs

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./cobertura.xml
          fail_ci_if_error: true
